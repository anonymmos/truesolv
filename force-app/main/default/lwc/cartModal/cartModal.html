<template>
  <section class="slds-modal slds-fade-in-open" role="dialog">
    <div class="slds-modal__container">
      <header class="slds-modal__header">
        <lightning-button-icon
          icon-name="utility:close"
          class="slds-modal__close"
          onclick={handleClose}
          alternative-text="Close"
        ></lightning-button-icon>
        <h2 class="slds-text-heading_medium">Cart</h2>
      </header>
      <div class="slds-modal__content slds-p-around_medium">
        <table class="slds-table slds-table_bordered">
          <thead>
            <tr>
              <th>Item</th>
              <th>Price</th>
              <th>Amount</th>
              <th>Total</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            <template for:each={cartItems} for:item="line">
              <tr key={line.Id}>
                <td>{line.Name}</td>
                <td>{line.Price__c}</td>
                <td>{line.amount}</td>
                <td>{line.lineTotal}</td>
                <td>
                  <lightning-button
                    label="Remove"
                    data-id={line.Id}
                    onclick={handleRemove}
                  ></lightning-button>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
        <p class="slds-p-top_small"><b>Grand Total: {total}</b></p>
      </div>
      <footer class="slds-modal__footer">
        <lightning-button
          label="Checkout"
          variant="brand"
          onclick={handleCheckout}
        ></lightning-button>
      </footer>
    </div>
  </section>
  <div class="slds-backdrop slds-backdrop_open"></div>
</template>
