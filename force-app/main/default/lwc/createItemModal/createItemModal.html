<template>
  <section class="slds-modal slds-fade-in-open" role="dialog">
    <div class="slds-modal__container">
      <header class="slds-modal__header">
        <lightning-button-icon
          icon-name="utility:close"
          class="slds-modal__close"
          onclick={handleClose}
          alternative-text="Close"
        ></lightning-button-icon>
        <h2 class="slds-text-heading_medium">Create Item</h2>
      </header>
      <div class="slds-modal__content slds-p-around_medium">
        <template if:true={isLoadingImage}>
          <lightning-spinner
            alternative-text="Fetching image..."
          ></lightning-spinner>
        </template>

        <lightning-record-edit-form
          object-api-name="Item__c"
          onsubmit={handleSubmit}
          onsuccess={handleSuccess}
        >
          <lightning-messages></lightning-messages>

          <lightning-input-field field-name="Name"></lightning-input-field>
          <lightning-input-field
            field-name="Description__c"
          ></lightning-input-field>
          <lightning-input-field field-name="Price__c"></lightning-input-field>
          <lightning-input-field field-name="Family__c"></lightning-input-field>
          <lightning-input-field field-name="Type__c"></lightning-input-field>
          <lightning-input-field
            field-name="AvailableQuantity__c"
          ></lightning-input-field>

          <div class="slds-m-top_medium">
            <lightning-button
              type="submit"
              variant="brand"
              label="Create"
              disabled={isLoadingImage}
            >
            </lightning-button>
            <lightning-button
              class="slds-m-left_small"
              label="Cancel"
              onclick={handleClose}
            >
            </lightning-button>
          </div>
        </lightning-record-edit-form>
      </div>
      <footer class="slds-modal__footer">
        <lightning-button
          label="Close"
          onclick={handleClose}
        ></lightning-button>
      </footer>
    </div>
  </section>
  <div class="slds-backdrop slds-backdrop_open"></div>
</template>
